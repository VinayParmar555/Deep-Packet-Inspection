services:
  redis:
    image: redis
    restart: unless-stopped
  app:
    build: .
    container_name: deep-packet-inspection
    restart: unless-stopped
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000
    ports: 
      - 8001:8000
    env_file: 
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app